<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ravro Kanban</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f0f;
      --surface:     #1a1a1a;
      --card:        #242424;
      --card-hover:  #2c2c2c;
      --border:      #2e2e2e;
      --maroon:      #8b1a1a;
      --maroon-dim:  #5c1111;
      --maroon-glow: rgba(139, 26, 26, 0.18);
      --text:        #e2e2e2;
      --text-muted:  #6b6b6b;
      --text-dim:    #9a9a9a;
      --danger:      #c0392b;
      --radius:      6px;
    }

    html, body, #root {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      user-select: none;
      flex-shrink: 0;
    }

    .header-logo {
      width: 22px; height: 22px;
      background: var(--maroon);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #fff;
      letter-spacing: -0.5px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
      -webkit-app-region: no-drag;
    }

    .board {
      display: flex;
      flex: 1;
      gap: 16px;
      padding: 20px 24px;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
    }

    /* ── Column ─────────────────────────────────── */
    .column {
      display: flex;
      flex-direction: column;
      min-width: 280px;
      max-width: 320px;
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: 100%;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 11px;
      border-bottom: 2px solid var(--maroon-dim);
      background: var(--surface);
      flex-shrink: 0;
    }

    .column-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .column-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--maroon);
      background: var(--maroon-glow);
      border: 1px solid var(--maroon-dim);
      border-radius: 10px;
      padding: 1px 7px;
      min-width: 22px;
      text-align: center;
    }

    .card-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-list::-webkit-scrollbar { width: 4px; }
    .card-list::-webkit-scrollbar-track { background: transparent; }
    .card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: default;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
      position: relative;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: #3a3a3a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .card-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.12s;
    }

    .card:hover .card-actions { opacity: 1; }

    .btn-move {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .btn-move:hover {
      background: var(--maroon-glow);
      border-color: var(--maroon-dim);
      color: var(--text);
    }

    .btn-delete {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      margin-left: auto;
      transition: background 0.1s, color 0.1s;
    }

    .btn-delete:hover {
      background: rgba(192, 57, 43, 0.15);
      color: var(--danger);
    }

    /* ── Add-card area ──────────────────────────── */
    .add-area {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .add-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      resize: none;
      outline: none;
      font-family: inherit;
      transition: border-color 0.12s, box-shadow 0.12s;
      min-height: 60px;
    }

    .add-input::placeholder { color: var(--text-muted); }

    .add-input:focus {
      border-color: var(--maroon-dim);
      box-shadow: 0 0 0 2px var(--maroon-glow);
    }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .btn-add {
      flex: 1;
      padding: 6px 12px;
      background: var(--maroon);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-add:hover { background: #a01f1f; }
    .btn-add:disabled { opacity: 0.4; cursor: default; }

    .btn-cancel {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.1s;
    }

    .btn-cancel:hover { color: var(--text); }

    .btn-new-card {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.12s, color 0.12s;
    }

    .btn-new-card:hover {
      border-color: var(--maroon-dim);
      color: var(--text-dim);
    }

    .empty-hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 20px 10px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const DEFAULT_COLUMNS = [
  { id: 'backlog',     title: 'Backlog',     cards: [] },
  { id: 'in-progress', title: 'In Progress', cards: [] },
  { id: 'review',      title: 'Review',      cards: [] },
  { id: 'done',        title: 'Done',        cards: [] },
];

let _idCounter = Date.now();
const uid = () => `c-${++_idCounter}`;

function AddCardForm({ onAdd, onCancel }) {
  const [text, setText] = useState('');
  const ref = useRef(null);

  useEffect(() => { ref.current?.focus(); }, []);

  const submit = () => {
    const t = text.trim();
    if (t) { onAdd(t); setText(''); }
  };

  return (
    <div>
      <textarea
        ref={ref}
        className="add-input"
        placeholder="Card title…"
        value={text}
        onChange={e => setText(e.target.value)}
        onKeyDown={e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
          if (e.key === 'Escape') onCancel();
        }}
      />
      <div className="add-row">
        <button className="btn-add" onClick={submit} disabled={!text.trim()}>
          Add Card
        </button>
        <button className="btn-cancel" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

function Card({ card, isFirst, isLast, onMoveLeft, onMoveRight, onDelete }) {
  return (
    <div className="card">
      <div className="card-text">{card.text}</div>
      <div className="card-actions">
        {!isFirst && (
          <button className="btn-move" onClick={() => onMoveLeft(card.id)} title="Move left">
            ← Left
          </button>
        )}
        {!isLast && (
          <button className="btn-move" onClick={() => onMoveRight(card.id)} title="Move right">
            Right →
          </button>
        )}
        <button className="btn-delete" onClick={() => onDelete(card.id)} title="Delete">✕</button>
      </div>
    </div>
  );
}

function Column({ col, colIndex, totalCols, onAddCard, onMoveCard, onDeleteCard }) {
  const [adding, setAdding] = useState(false);

  const handleAdd = (text) => {
    onAddCard(col.id, { id: uid(), text });
    setAdding(false);
  };

  return (
    <div className="column">
      <div className="column-header">
        <span className="column-title">{col.title}</span>
        <span className="column-count">{col.cards.length}</span>
      </div>

      <div className="card-list">
        {col.cards.length === 0 && !adding && (
          <p className="empty-hint">No cards yet</p>
        )}
        {col.cards.map(card => (
          <Card
            key={card.id}
            card={card}
            isFirst={colIndex === 0}
            isLast={colIndex === totalCols - 1}
            onMoveLeft={(id) => onMoveCard(id, col.id, 'left')}
            onMoveRight={(id) => onMoveCard(id, col.id, 'right')}
            onDelete={(id) => onDeleteCard(col.id, id)}
          />
        ))}
      </div>

      <div className="add-area">
        {adding ? (
          <AddCardForm onAdd={handleAdd} onCancel={() => setAdding(false)} />
        ) : (
          <button className="btn-new-card" onClick={() => setAdding(true)}>
            + New card
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [columns, setColumns] = useState(DEFAULT_COLUMNS);

  // Load persisted board on mount
  useEffect(() => {
    const api = window.electronAPI;
    if (!api) return;
    api.loadBoard().then(data => {
      if (data?.columns) setColumns(data.columns);
    });
  }, []);

  // Persist on every change
  const persist = useCallback((cols) => {
    window.electronAPI?.saveBoard({ columns: cols });
  }, []);

  const addCard = useCallback((colId, card) => {
    setColumns(prev => {
      const next = prev.map(c =>
        c.id === colId ? { ...c, cards: [...c.cards, card] } : c
      );
      persist(next);
      return next;
    });
  }, [persist]);

  const moveCard = useCallback((cardId, fromColId, direction) => {
    setColumns(prev => {
      const fromIdx = prev.findIndex(c => c.id === fromColId);
      const toIdx = direction === 'left' ? fromIdx - 1 : fromIdx + 1;
      if (toIdx < 0 || toIdx >= prev.length) return prev;

      const card = prev[fromIdx].cards.find(c => c.id === cardId);
      if (!card) return prev;

      const next = prev.map((col, i) => {
        if (i === fromIdx) return { ...col, cards: col.cards.filter(c => c.id !== cardId) };
        if (i === toIdx)   return { ...col, cards: [...col.cards, card] };
        return col;
      });
      persist(next);
      return next;
    });
  }, [persist]);

  const deleteCard = useCallback((colId, cardId) => {
    setColumns(prev => {
      const next = prev.map(c =>
        c.id === colId ? { ...c, cards: c.cards.filter(card => card.id !== cardId) } : c
      );
      persist(next);
      return next;
    });
  }, [persist]);

  const totalCards = columns.reduce((s, c) => s + c.cards.length, 0);

  return (
    <div className="app">
      <header className="header">
        <div className="header-logo">RK</div>
        <span className="header-title">Ravro Kanban</span>
        <span className="header-sub">{totalCards} card{totalCards !== 1 ? 's' : ''}</span>
      </header>
      <main className="board">
        {columns.map((col, i) => (
          <Column
            key={col.id}
            col={col}
            colIndex={i}
            totalCols={columns.length}
            onAddCard={addCard}
            onMoveCard={moveCard}
            onDeleteCard={deleteCard}
          />
        ))}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
